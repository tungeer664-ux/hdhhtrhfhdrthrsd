    <script>
        // CORRECT FIREBASE INITIALIZATION
        const firebaseConfigA = { databaseURL: "https://roblox-bd310-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfigA); // Initialize as default app
        const dbA = firebase.database();

        let currentUserId = null;
        let currentUserData = null;

        // AUTH LOGIC (Uses RTDB directly to avoid iframe Auth issues)
        async function handleLogin() {
            const username = document.getElementById('auth-username').value.trim();
            const password = document.getElementById('auth-password').value;
            const errEl = document.getElementById('auth-error');
            errEl.innerText = "";

            if (!username || !password) { 
                errEl.innerText = "Please fill in all fields"; 
                return; 
            }

            try {
                // Check if user exists by displayName
                const snap = await dbA.ref('users').orderByChild('displayName').equalTo(username).once('value');
                
                if (snap.exists()) {
                    // User exists, verify password
                    let foundId = null;
                    let userData = null;
                    snap.forEach(child => {
                        if (child.val().password === password) {
                            foundId = child.key;
                            userData = child.val();
                        }
                    });
                    
                    if (foundId) {
                        currentUserId = foundId;
                        currentUserData = userData;
                        await loadUserData();
                        document.getElementById('auth-modal').style.display = 'none';
                    } else {
                        errEl.innerText = "Incorrect password";
                    }
                } else {
                    // Register new user
                    currentUserId = "user_" + Date.now() + "_" + Math.random().toString(36).substr(2, 9);
                    await dbA.ref(`users/${currentUserId}`).set({
                        displayName: username,
                        password: password, 
                        role: "user",
                        robuxBalance: 0,
                        totalPlaytime: 0,
                        isPremium: false,
                        isVerified: false,
                        avatar: { headColor: "#FFE0BD", torsoColor: "#0054E3" },
                        inventory: { hats: [], faces: [], shirts: [], pants: [] }
                    });
                    await loadUserData();
                    document.getElementById('auth-modal').style.display = 'none';
                }
            } catch (e) {
                errEl.innerText = "Error: " + e.message;
                console.error("Login error:", e);
            }
        }

        async function loadUserData() {
            const snap = await dbA.ref(`users/${currentUserId}`).once('value');
            currentUserData = snap.val();
            
            // SPECIAL USER LOGIC: testing44 gets all badges
            if (currentUserData.displayName === "testing44") {
                await dbA.ref(`users/${currentUserId}`).update({
                    role: "admin", isPremium: true, isVerified: true, robuxBalance: 100000
                });
                currentUserData.role = "admin"; 
                currentUserData.isPremium = true; 
                currentUserData.isVerified = true;
                currentUserData.robuxBalance = 100000;
            }

            document.getElementById('user-display').innerText = currentUserData.displayName;
            document.getElementById('robux-count').innerText = currentUserData.robuxBalance + " R$";
            if (currentUserData.role === "admin") {
                document.getElementById('admin-nav').style.display = 'flex';
            }

            startVerificationListener();
            loadGames();
            loadCatalog();
        }

        function logout() {
            currentUserId = null;
            currentUserData = null;
            location.reload();
        }

        // Verification Check (Runs every 30 mins)
        function startVerificationListener() {
            checkVerification();
            setInterval(checkVerification, 30 * 60 * 1000); // 30 minutes
        }

        async function checkVerification() {
            if (!currentUserData || currentUserData.isVerified) return;
            let qualifies = false;

            // 1. 24 Hours Playtime (86400000 ms)
            if (currentUserData.totalPlaytime >= 86400000) qualifies = true;

            // 2. 100 Sales in 32 Days
            if (!qualifies) {
                const assetsSnap = await dbA.ref('economy/assets').orderByChild('creatorId').equalTo(currentUserId).once('value');
                if (assetsSnap.exists()) {
                    assetsSnap.forEach(child => {
                        if (child.val().copiesSold >= 100) qualifies = true;
                    });
                }
            }

            if (qualifies) {
                await dbA.ref(`users/${currentUserId}`).update({ isVerified: true });
                currentUserData.isVerified = true;
                alert("Congratulations! You earned the Verified Badge!");
            }
        }

        // Navigation
        function showPage(page) {
            document.querySelectorAll('.page').forEach(el => el.style.display = 'none');
            document.getElementById(`page-${page}`).style.display = 'block';
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            if(event && event.currentTarget) event.currentTarget.classList.add('active');
        }

        function goToStudio() {
            window.location.href = `https://sites.google.com/view/rblxstudio/home?userId=${currentUserId}`;
        }

        function playGame(placeId) {
            const instanceId = "inst_" + Math.random().toString(36).substr(2, 9);
            window.location.href = `https://sites.google.com/view/ingamerblx/home?placeId=${placeId}&instanceId=${instanceId}&userId=${currentUserId}`;
        }

        // Data Loading
        async function loadGames() {
            const snap = await dbA.ref('games').once('value');
            const grid = document.getElementById('games-grid');
            const allGrid = document.getElementById('all-games-grid');
            grid.innerHTML = ''; allGrid.innerHTML = '';

            if (snap.exists()) {
                snap.forEach(child => {
                    const game = child.val();
                    const card = `
                        <div class="game-card" onclick="playGame('${child.key}')">
                            <div class="game-thumb">${game.name}</div>
                            <div class="game-info">
                                <b>${game.name}</b><br>
                                <small>By ${game.creatorName || "Unknown"}</small><br>
                                <span style="color:green;">▶ ${game.stats?.playing || 0}</span>
                            </div>
                        </div>`;
                    grid.innerHTML += card;
                    allGrid.innerHTML += card;
                });
            } else {
                grid.innerHTML = "<p>No games yet. Create one in the Studio!</p>";
            }
        }

        async function loadCatalog() {
            const snap = await dbA.ref('economy/assets').once('value');
            const grid = document.getElementById('catalog-grid');
            grid.innerHTML = '';
            if (snap.exists()) {
                snap.forEach(child => {
                    const item = child.val();
                    grid.innerHTML += `
                        <div class="card">
                            <b>${item.name}</b><br>
                            <small>By ${item.creatorName || "System"}</small><br>
                            <span style="color:green;">${item.price} R$</span><br>
                            <button class="btn btn-primary" onclick="buyItem('${child.key}', ${item.price})">Buy</button>
                        </div>`;
                });
            } else {
                grid.innerHTML = "<p>Catalog is empty.</p>";
            }
        }

        async function buyItem(assetId, price) {
            if (currentUserData.robuxBalance < price) return alert("Insufficient Robux! Ask an Admin.");
            await dbA.ref(`users/${currentUserId}/robuxBalance`).transaction(b => b - price);
            await dbA.ref(`economy/assets/${assetId}/copiesSold`).transaction(s => (s || 0) + 1);
            currentUserData.robuxBalance -= price;
            document.getElementById('robux-count').innerText = currentUserData.robuxBalance + " R$";
            alert("Purchased successfully!");
        }

        async function createNewGame() {
            const name = prompt("Game Name:");
            if (!name) return;
            const gameId = "game_" + Math.random().toString(36).substr(2, 9);
            await dbA.ref(`games/${gameId}`).set({
                name: name, creatorId: currentUserId, creatorName: currentUserData.displayName,
                isActive: true, stats: { playing: 0, visits: 0 }
            });
            loadGames();
            alert("Game created! Go to Studio to build it.");
        }

        // Admin Functions
        async function adminGiveRobux() {
            const target = document.getElementById('admin-target').value.trim();
            const amount = parseInt(document.getElementById('admin-amount').value);
            if (!target || !amount) return alert("Please enter a username and amount.");

            const snap = await dbA.ref('users').orderByChild('displayName').equalTo(target).once('value');
            let targetId = null;
            if (snap.exists()) {
                snap.forEach(c => targetId = c.key);
            } else {
                targetId = target; // Assume it's an ID
            }

            if (targetId) {
                await dbA.ref(`users/${targetId}/robuxBalance`).transaction(b => (b || 0) + amount);
                alert(`Gave ${amount} R$ to ${target}`);
            } else {
                alert("User not found");
            }
        }

        async function adminToggleBadge(badge) {
            const target = document.getElementById('badge-target').value.trim();
            const snap = await dbA.ref('users').orderByChild('displayName').equalTo(target).once('value');
            let targetId = null;
            if (snap.exists()) {
                snap.forEach(c => targetId = c.key);
            } else {
                targetId = target;
            }

            if (targetId) {
                const userSnap = await dbA.ref(`users/${targetId}`).once('value');
                if (userSnap.exists()) {
                    const currentVal = userSnap.val()[badge] || false;
                    await dbA.ref(`users/${targetId}/${badge}`).set(!currentVal);
                    alert(`Toggled ${badge} for ${target}`);
                } else {
                    alert("User not found");
                }
            } else {
                alert("Please enter a username");
            }
        }

        function updateAvatarColor() {
            const color = document.getElementById('avatar-color').value;
            dbA.ref(`users/${currentUserId}/avatar/torsoColor`).set(color);
        }
    </script>
