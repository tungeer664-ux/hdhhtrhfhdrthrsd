<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Portal</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f3f3f3; color: #333; }
        #topbar { background: #232527; color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; position: fixed; width: 100%; top: 0; z-index: 100; box-sizing: border-box; height: 50px; }
        #topbar .logo { font-size: 24px; font-weight: bold; color: white; text-decoration: none; }
        #topbar .nav-right { display: flex; align-items: center; gap: 15px; }
        .robux-display { color: #00b06f; font-weight: bold; font-size: 18px; }
        #sidebar { width: 220px; background: #232527; height: calc(100vh - 50px); position: fixed; top: 50px; left: 0; padding-top: 10px; overflow-y: auto; }
        .nav-item { padding: 15px 20px; color: #b8b8b8; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 16px; border-left: 4px solid transparent; }
        .nav-item:hover, .nav-item.active { background: #393b3d; color: white; border-left: 4px solid #00a2ff; }
        #content { margin-left: 220px; margin-top: 50px; padding: 20px; min-height: calc(100vh - 50px); }
        .page { display: none; }
        .page.active { display: block; }
        .card { background: white; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-primary { background: #00a2ff; color: white; }
        .btn-green { background: #00b06f; color: white; }
        .btn-red { background: #e34c4c; color: white; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        input, select { padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 4px; width: 100%; box-sizing: border-box; font-size: 14px; }
        #hammer-btn { position: fixed; bottom: 30px; left: 30px; width: 70px; height: 70px; background: #f5cd35; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 35px; z-index: 1000; border: 4px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: 0.2s; }
        #hammer-btn:hover { transform: scale(1.1) rotate(15deg); }
        #auth-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .modal-box { background: white; padding: 40px; border-radius: 12px; width: 350px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .game-card { background: white; border-radius: 8px; overflow: hidden; cursor: pointer; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .game-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .game-thumb { width: 100%; height: 130px; background: #ddd; display: flex; align-items: center; justify-content: center; color: #666; font-size: 20px; font-weight: bold; }
        .game-info { padding: 12px; }
        .badge { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: bold; color: white; margin-left: 5px; }
        .badge-premium { background: #00b06f; }
        .badge-verified { background: #00a2ff; }
        .badge-admin { background: #e34c4c; }
    </style>
</head>
<body>

    <div id="auth-modal">
        <div class="modal-box">
            <h2 style="margin-top:0;">Welcome to Roblox</h2>
            <p style="color:#666;">Sign in to continue</p>
            <input type="text" id="auth-user" placeholder="Username">
            <input type="password" id="auth-pass" placeholder="Password">
            <button class="btn btn-primary" style="width:100%; margin-top:15px;" onclick="handleAuth()">Login / Register</button>
            <p id="auth-err" style="color:red; margin-top:10px; font-size:14px;"></p>
        </div>
    </div>

    <div id="topbar">
        <a href="#" class="logo" onclick="showPage('home')">ROBLOX</a>
        <div class="nav-right">
            <span class="robux-display" id="ui-robux">0 R$</span>
            <span id="ui-user" style="font-weight:bold;"></span>
            <span id="ui-badges"></span>
            <button class="btn btn-red" style="padding: 5px 10px; font-size: 12px;" onclick="logout()">Logout</button>
        </div>
    </div>

    <div id="sidebar">
        <div class="nav-item active" onclick="showPage('home')">🏠 Home</div>
        <div class="nav-item" onclick="showPage('games')">🎮 Games</div>
        <div class="nav-item" onclick="showPage('catalog')">🛒 Catalog</div>
        <div class="nav-item" onclick="showPage('avatar')">👤 Avatar</div>
        <div class="nav-item" id="nav-admin" style="display:none;" onclick="showPage('admin')">🛡️ Admin Panel</div>
    </div>

    <div id="content">
        <div id="page-home" class="page active">
            <h2>Featured Games</h2>
            <div class="grid" id="grid-home"></div>
        </div>
        <div id="page-games" class="page">
            <h2>All Games</h2>
            <button class="btn btn-green" onclick="createGame()">+ Create New Game</button>
            <div class="grid" id="grid-games" style="margin-top:20px;"></div>
        </div>
        <div id="page-catalog" class="page">
            <h2>Catalog</h2>
            <div class="grid" id="grid-catalog"></div>
        </div>
        <div id="page-avatar" class="page">
            <h2>Avatar Editor</h2>
            <div class="card">
                <h3>Customize Colors</h3>
                <label>Torso Color:</label>
                <input type="color" id="col-torso" value="#0054E3" onchange="updateAvatar('torsoColor', this.value)">
                <label>Head Color:</label>
                <input type="color" id="col-head" value="#FFE0BD" onchange="updateAvatar('headColor', this.value)">
            </div>
        </div>
        <div id="page-admin" class="page">
            <h2>Admin Panel</h2>
            <div class="card">
                <h3>💰 Distribute Robux</h3>
                <p>Give Robux to a user (Admin Only)</p>
                <input type="text" id="adm-target" placeholder="Target Username">
                <input type="number" id="adm-amount" placeholder="Amount (e.g. 1000)">
                <button class="btn btn-green" onclick="adminGiveRobux()">Give Robux</button>
            </div>
            <div class="card">
                <h3>🏅 Manage Badges</h3>
                <p>Toggle Premium or Verified status</p>
                <input type="text" id="badge-target" placeholder="Target Username">
                <button class="btn btn-primary" onclick="adminToggleBadge('isPremium')">Toggle Premium</button>
                <button class="btn btn-primary" onclick="adminToggleBadge('isVerified')">Toggle Verified</button>
            </div>
        </div>
    </div>

    <button id="hammer-btn" onclick="openStudio()" title="Open Studio">🔨</button>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = { databaseURL: "https://roblox-bd310-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = null;
        let currentUserId = null;
        let verificationTimer = null;

        window.handleAuth = async function() {
            const username = document.getElementById('auth-user').value.trim();
            const password = document.getElementById('auth-pass').value;
            const err = document.getElementById('auth-err');
            err.innerText = "";

            if(!username || !password) { err.innerText = "Fill all fields"; return; }

            try {
                const snap = await db.ref('users').orderByChild('displayName').equalTo(username).once('value');
                
                if (snap.exists()) {
                    let foundId = null; let data = null;
                    snap.forEach(c => {
                        if(c.val().password === password) { foundId = c.key; data = c.val(); }
                    });
                    if(foundId) {
                        currentUserId = foundId; currentUser = data;
                        await enterApp();
                    } else { err.innerText = "Incorrect password"; }
                } else {
                    currentUserId = "user_" + Date.now();
                    const newUser = {
                        displayName: username, password: password, role: "user",
                        robuxBalance: 0, totalPlaytime: 0, isPremium: false, isVerified: false,
                        avatar: { headColor: "#FFE0BD", torsoColor: "#0054E3" },
                        createdAt: Date.now()
                    };
                    await db.ref(`users/${currentUserId}`).set(newUser);
                    currentUser = newUser;
                    await enterApp();
                }
            } catch (e) { err.innerText = "Error: " + e.message; }
        };

        async function enterApp() {
            document.getElementById('auth-modal').style.display = 'none';
            
            if (currentUser.displayName === "testing44") {
                await db.ref(`users/${currentUserId}`).update({ role: "admin", isPremium: true, isVerified: true, robuxBalance: 100000 });
                currentUser.role = "admin"; currentUser.isPremium = true; currentUser.isVerified = true; currentUser.robuxBalance = 100000;
            }

            updateUI();
            loadGames();
            loadCatalog();
            startVerificationLoop();
        }

        function updateUI() {
            document.getElementById('ui-user').innerText = currentUser.displayName;
            document.getElementById('ui-robux').innerText = currentUser.robuxBalance + " R$";
            
            let badges = "";
            if(currentUser.role === 'admin') badges += "<span class='badge badge-admin'>ADMIN</span>";
            if(currentUser.isPremium) badges += "<span class='badge badge-premium'>PREMIUM</span>";
            if(currentUser.isVerified) badges += "<span class='badge badge-verified'>VERIFIED</span>";
            document.getElementById('ui-badges').innerHTML = badges;

            if(currentUser.role === 'admin') document.getElementById('nav-admin').style.display = 'flex';
        }

        window.logout = function() { location.reload(); };

        window.showPage = function(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(`page-${id}`).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(event && event.currentTarget) event.currentTarget.classList.add('active');
        };

        // ==========================================
        // NAVIGATION (FIXED FOR GOOGLE SITES IFRAMES)
        // ==========================================
        window.openStudio = function() {
            const url = `https://sites.google.com/view/rblxstudio/home?userId=${currentUserId}&username=${encodeURIComponent(currentUser.displayName)}`;
            // window.top breaks out of the Google Sites iframe to prevent 403 errors
            window.top.location.href = url; 
        };

        window.playGame = function(placeId) {
            const instId = "inst_" + Math.random().toString(36).substr(2, 9);
            const url = `https://sites.google.com/view/ingamerblx/home?placeId=${placeId}&instanceId=${instId}&userId=${currentUserId}`;
            // window.top breaks out of the Google Sites iframe to prevent 403 errors
            window.top.location.href = url; 
        };
        // ==========================================

        function startVerificationLoop() {
            checkVerification();
            verificationTimer = setInterval(checkVerification, 30 * 60 * 1000);
        }

        async function checkVerification() {
            if (!currentUser || currentUser.isVerified) return;
            let qualified = false;

            if (currentUser.totalPlaytime >= 86400000) qualified = true;

            if (!qualified) {
                const assetsSnap = await db.ref('economy/assets').orderByChild('creatorId').equalTo(currentUserId).once('value');
                if (assetsSnap.exists()) {
                    const thirtyTwoDaysAgo = Date.now() - (32 * 24 * 60 * 60 * 1000);
                    assetsSnap.forEach(c => {
                        const item = c.val();
                        if (item.createdAt >= thirtyTwoDaysAgo && item.copiesSold >= 100) qualified = true;
                    });
                }
            }

            if (qualified) {
                await db.ref(`users/${currentUserId}/isVerified`).set(true);
                currentUser.isVerified = true;
                updateUI();
                alert("🎉 Congratulations! You have earned the Verified Badge!");
            }
        }

        async function loadGames() {
            const snap = await db.ref('games').once('value');
            const html = snap.exists() ? '' : '<p>No games available yet.</p>';
            let grid = "";
            if(snap.exists()) {
                snap.forEach(c => {
                    const g = c.val();
                    grid += `<div class="game-card" onclick="playGame('${c.key}')">
                        <div class="game-thumb">${g.name}</div>
                        <div class="game-info"><b>${g.name}</b><br><small>By ${g.creatorName}</small></div>
                    </div>`;
                });
            }
            document.getElementById('grid-home').innerHTML = grid;
            document.getElementById('grid-games').innerHTML = grid;
        }

        async function loadCatalog() {
            const snap = await db.ref('economy/assets').once('value');
            let grid = "";
            if(snap.exists()) {
                snap.forEach(c => {
                    const i = c.val();
                    grid += `<div class="card">
                        <b>${i.name}</b><br><small>By ${i.creatorName}</small><br>
                        <span style="color:green; font-weight:bold;">${i.price} R$</span><br>
                        <button class="btn btn-primary" style="margin-top:10px;" onclick="buyItem('${c.key}', ${i.price})">Buy</button>
                    </div>`;
                });
            } else { grid = "<p>Catalog is empty.</p>"; }
            document.getElementById('grid-catalog').innerHTML = grid;
        }

        window.buyItem = async function(id, price) {
            if (currentUser.robuxBalance < price) return alert("Insufficient Robux. Ask an Admin for more!");
            await db.ref(`users/${currentUserId}/robuxBalance`).set(currentUser.robuxBalance - price);
            await db.ref(`economy/assets/${id}/copiesSold`).transaction(v => (v || 0) + 1);
            currentUser.robuxBalance -= price;
            updateUI();
            alert("Purchase successful!");
        };

        window.createGame = async function() {
            const name = prompt("Game Name:");
            if(!name) return;
            const id = "game_" + Date.now();
            await db.ref(`games/${id}`).set({
                name: name, creatorId: currentUserId, creatorName: currentUser.displayName,
                isActive: true, stats: { playing: 0, visits: 0 }, createdAt: Date.now()
            });
            loadGames();
            alert("Game created! Go to Studio to build it.");
        };

        window.updateAvatar = function(part, color) {
            db.ref(`users/${currentUserId}/avatar/${part}`).set(color);
        };

        window.adminGiveRobux = async function() {
            if (currentUser.role !== 'admin') return alert("Access Denied.");
            const target = document.getElementById('adm-target').value.trim();
            const amt = parseInt(document.getElementById('adm-amount').value);
            if(!target || !amt) return;

            const snap = await db.ref('users').orderByChild('displayName').equalTo(target).once('value');
            if(snap.exists()) {
                let tid = null; snap.forEach(c => tid = c.key);
                const userSnap = await db.ref(`users/${tid}`).once('value');
                const newBal = (userSnap.val().robuxBalance || 0) + amt;
                await db.ref(`users/${tid}/robuxBalance`).set(newBal);
                alert(`Gave ${amt} R$ to ${target}`);
            } else { alert("User not found."); }
        };

        window.adminToggleBadge = async function(badge) {
            if (currentUser.role !== 'admin') return alert("Access Denied.");
            const target = document.getElementById('badge-target').value.trim();
            const snap = await db.ref('users').orderByChild('displayName').equalTo(target).once('value');
            if(snap.exists()) {
                let tid = null; snap.forEach(c => tid = c.key);
                const userSnap = await db.ref(`users/${tid}`).once('value');
                const currentVal = userSnap.val()[badge] || false;
                await db.ref(`users/${tid}/${badge}`).set(!currentVal);
                alert(`Toggled ${badge} for ${target}`);
            } else { alert("User not found."); }
        };
    </script>
</body>
</html>
