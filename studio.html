<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Roblox Studio</title>
    <style>
        body { margin: 0; font-family: Arial; background: #1e1e1e; color: white; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #toolbar { background: #2d2d2d; padding: 10px; display: flex; gap: 10px; border-bottom: 1px solid #444; }
        #main { display: flex; flex: 1; overflow: hidden; }
        #toolbox { width: 200px; background: #252526; padding: 10px; border-right: 1px solid #444; overflow-y: auto; }
        #viewport { flex: 1; position: relative; background: #333; }
        #right { width: 300px; background: #252526; display: flex; flex-direction: column; border-left: 1px solid #444; }
        .btn { padding: 8px 15px; border: none; color: white; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .btn-blue { background: #007acc; }
        .btn-green { background: #00b06f; }
        .btn-red { background: #e34c4c; }
        .tool-item { padding: 10px; background: #3e3e42; margin-bottom: 5px; cursor: pointer; border-radius: 4px; text-align: center; }
        .tool-item:hover { background: #505055; }
        .exp-item { padding: 5px; cursor: pointer; font-size: 14px; }
        .exp-item:hover, .exp-item.sel { background: #094771; }
        input, select { background: #333; border: 1px solid #555; color: white; padding: 5px; width: 100%; margin-bottom: 5px; box-sizing: border-box; }
        h3 { margin: 10px 0; font-size: 16px; border-bottom: 1px solid #444; padding-bottom: 5px; }
        .panel { flex: 1; padding: 10px; overflow-y: auto; border-bottom: 1px solid #444; }
    </style>
</head>
<body>
    <div id="toolbar">
        <button class="btn btn-blue" onclick="saveProject()">💾 Save</button>
        <button class="btn btn-green" onclick="publishGame()">🚀 Publish</button>
        <span style="margin-left:auto; align-self:center; color:#aaa;" id="status">Ready</span>
    </div>

    <div id="main">
        <div id="toolbox">
            <h3>Toolbox</h3>
            <div class="tool-item" onclick="addPart('block')">📦 Block</div>
            <div class="tool-item" onclick="addPart('sphere')">⚪ Sphere</div>
            <div class="tool-item" onclick="addPart('cylinder')">🥫 Cylinder</div>
            <div class="tool-item" onclick="addPart('spawn')">🚩 Spawn</div>
        </div>

        <div id="viewport"></div>

        <div id="right">
            <div class="panel">
                <h3>Explorer</h3>
                <div id="explorer-list"></div>
            </div>
            <div class="panel" style="border-bottom:none;">
                <h3>Properties</h3>
                <div id="props">Select an object</div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('userId') || "guest";
        const username = urlParams.get('username') || "Guest";
        const projectId = urlParams.get('projectId') || "proj_" + Date.now();

        const appA = firebase.initializeApp({ databaseURL: "https://roblox-bd310-default-rtdb.firebaseio.com/" }, "A");
        const appB = firebase.initializeApp({ databaseURL: "https://roblox-everything-else-default-rtdb.firebaseio.com/" }, "B");
        const dbA = appA.database();
        const dbB = appB.database();

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);
        const camera = new THREE.PerspectiveCamera(60, 1, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        document.getElementById('viewport').appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(50, 100, 50);
        scene.add(sun);
        scene.add(new THREE.GridHelper(100, 100, 0x555555, 0x333333));

        let camTheta = 0, camPhi = Math.PI/4, camRadius = 50;
        let dragging = false, prevX = 0, prevY = 0;
        let selected = null;
        const objects = [];

        function updateCam() {
            camera.position.x = camRadius * Math.sin(camPhi) * Math.sin(camTheta);
            camera.position.y = camRadius * Math.cos(camPhi);
            camera.position.z = camRadius * Math.sin(camPhi) * Math.cos(camTheta);
            camera.lookAt(0,0,0);
        }

        renderer.domElement.addEventListener('mousedown', e => { dragging = true; prevX = e.clientX; prevY = e.clientY; });
        window.addEventListener('mouseup', () => dragging = false);
        window.addEventListener('mousemove', e => {
            if(!dragging) return;
            camTheta -= (e.clientX - prevX) * 0.01;
            camPhi -= (e.clientY - prevY) * 0.01;
            camPhi = Math.max(0.1, Math.min(Math.PI-0.1, camPhi));
            prevX = e.clientX; prevY = e.clientY;
            updateCam();
        });
        renderer.domElement.addEventListener('wheel', e => { camRadius += e.deltaY * 0.05; updateCam(); });

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        renderer.domElement.addEventListener('dblclick', e => {
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObjects(objects);
            selectObj(hits.length > 0 ? hits[0].object : null);
        });

        function selectObj(obj) {
            if(selected) selected.material.emissive.setHex(0x000000);
            selected = obj;
            if(selected) selected.material.emissive.setHex(0x333333);
            renderExplorer(); renderProps();
        }

        window.addPart = function(type) {
            let geom;
            if(type==='block') geom = new THREE.BoxGeometry(4,4,4);
            else if(type==='sphere') geom = new THREE.SphereGeometry(2);
            else if(type==='cylinder') geom = new THREE.CylinderGeometry(2,2,4);
            else geom = new THREE.BoxGeometry(6,1,6);

            const mat = new THREE.MeshStandardMaterial({ color: type==='spawn' ? 0x00ff00 : 0x808080 });
            const mesh = new THREE.Mesh(geom, mat);
            mesh.position.y = 2;
            mesh.userData = { type: type, name: type + "_" + objects.length };
            scene.add(mesh);
            objects.push(mesh);
            selectObj(mesh);
        };

        function renderExplorer() {
            const list = document.getElementById('explorer-list');
            list.innerHTML = '';
            objects.forEach(o => {
                const div = document.createElement('div');
                div.className = 'exp-item' + (o===selected ? ' sel' : '');
                div.innerText = o.userData.name;
                div.onclick = () => selectObj(o);
                list.appendChild(div);
            });
        }

        function renderProps() {
            const p = document.getElementById('props');
            if(!selected) { p.innerHTML = "Select an object"; return; }
            p.innerHTML = `
                <label>Name</label>
                <input type="text" value="${selected.userData.name}" onchange="selected.userData.name=this.value; renderExplorer();">
                <label>Position X</label>
                <input type="number" step="0.1" value="${selected.position.x.toFixed(1)}" onchange="selected.position.x=parseFloat(this.value)">
                <label>Position Y</label>
                <input type="number" step="0.1" value="${selected.position.y.toFixed(1)}" onchange="selected.position.y=parseFloat(this.value)">
                <label>Position Z</label>
                <input type="number" step="0.1" value="${selected.position.z.toFixed(1)}" onchange="selected.position.z=parseFloat(this.value)">
                <label>Color</label>
                <input type="color" value="#${selected.material.color.getHexString()}" onchange="selected.material.color.setStyle(this.value)">
                <button class="btn btn-red" style="width:100%; margin-top:10px;" onclick="deleteObj()">Delete</button>
            `;
        }

        window.deleteObj = function() {
            if(!selected) return;
            scene.remove(selected);
            objects.splice(objects.indexOf(selected), 1);
            selectObj(null);
        };

        window.saveProject = async function() {
            document.getElementById('status').innerText = "Saving...";
            const data = objects.map(o => ({
                name: o.userData.name, type: o.userData.type,
                pos: { x:o.position.x, y:o.position.y, z:o.position.z },
                color: "#" + o.material.color.getHexString()
            }));
            await dbB.ref(`studioProjects/${projectId}`).set({
                creatorId: userId, creatorName: username, name: "My Project",
                updatedAt: Date.now(), instances: data
            });
            document.getElementById('status').innerText = "Saved!";
        };

        window.publishGame = async function() {
            await window.saveProject();
            document.getElementById('status').innerText = "Publishing...";
            const name = prompt("Game Name:", "My Awesome Game");
            if(!name) return;

            const placeId = "place_" + Date.now();
            await dbA.ref(`games/${placeId}`).set({
                name: name, creatorId: userId, creatorName: username,
                isActive: true, stats: { playing: 0, visits: 0 },
                projectId: projectId, createdAt: Date.now()
            });
            alert(`Published! ID: ${placeId}`);
            document.getElementById('status').innerText = "Published!";
        };

        async function loadProject() {
            const snap = await dbB.ref(`studioProjects/${projectId}`).once('value');
            if(snap.exists()) {
                const data = snap.val().instances || [];
                data.forEach(inst => {
                    let geom;
                    if(inst.type==='block') geom = new THREE.BoxGeometry(4,4,4);
                    else if(inst.type==='sphere') geom = new THREE.SphereGeometry(2);
                    else if(inst.type==='cylinder') geom = new THREE.CylinderGeometry(2,2,4);
                    else geom = new THREE.BoxGeometry(6,1,6);

                    const mat = new THREE.MeshStandardMaterial({ color: inst.color });
                    const mesh = new THREE.Mesh(geom, mat);
                    mesh.position.set(inst.pos.x, inst.pos.y, inst.pos.z);
                    mesh.userData = { type: inst.type, name: inst.name };
                    scene.add(mesh);
                    objects.push(mesh);
                });
                renderExplorer();
            }
        }
        loadProject();

        function resize() {
            const vp = document.getElementById('viewport');
            camera.aspect = vp.clientWidth / vp.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(vp.clientWidth, vp.clientHeight);
        }
        window.addEventListener('resize', resize);
        setTimeout(() => { resize(); updateCam(); }, 100);

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
